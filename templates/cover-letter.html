<!DOCTYPE html>
<!--
  career skill — 자소서(cover letter) 작성/제출 템플릿 (②)
  자소서는 이력서와 구조가 다르다: 문항 + 답변 + 글자수 제한. 이 템플릿은 문항별 블록 +
  실시간 글자수 카운터(공백 포함/제외) + 권장 상한 경고 + [전체 복사]를 제공한다.
  스킬이 뱅크에서 답변 초안을 채우고, 사용자가 다듬는다. 자체완결, 외부 네트워크 0.
  ★ 커밋되는 이 파일은 GENERIC 샘플만(PII 금지).
-->
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>career — 자소서</title>
<style>
  :root{
    --accent:#9a3b2e; --ink:#1b1a17; --muted:#6c675e; --faint:#9b958a;
    --line:#e7e3da; --line-2:#d4cec3; --wash:#f7efec; --paper:#fff; --over:#b23b2e;
    --serif:'Iowan Old Style','Palatino Linotype',Palatino,Georgia,serif;
    --sans:'Pretendard','Pretendard Variable',-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Malgun Gothic','Segoe UI',Roboto,sans-serif;
  }
  *{ box-sizing:border-box; -webkit-print-color-adjust:exact; print-color-adjust:exact; }
  html,body{ margin:0; padding:0; background:#eceae4; color:var(--ink); font-family:var(--sans);
    font-size:14px; line-height:1.55; letter-spacing:-0.002em; }
  .wrap{ max-width:820px; margin:0 auto; padding:26px 16px 90px; }
  .bar{ height:3px; width:60px; background:var(--accent); margin-bottom:14px; }
  h1{ margin:0; font-size:24px; font-weight:800; letter-spacing:-0.02em; }
  .lead{ margin:8px 0 0; color:var(--muted); font-size:13px; }
  .head-row{ display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:14px; }
  .field label{ display:block; font-size:11px; font-weight:700; letter-spacing:0.02em; color:var(--muted);
    text-transform:uppercase; margin:0 0 5px; }
  .field input{ width:100%; font-family:var(--sans); font-size:14px; color:var(--ink); background:#fff;
    border:1px solid var(--line-2); border-radius:7px; padding:9px 11px; }
  @media(max-width:600px){ .head-row{ grid-template-columns:1fr; } }

  /* 문항 블록 */
  .q{ background:var(--paper); border:1px solid var(--line); border-radius:11px; padding:16px 18px; margin-top:14px; }
  .q-top{ display:flex; align-items:center; gap:10px; margin-bottom:8px; }
  .q-no{ font-family:var(--serif); font-style:italic; font-size:15px; color:var(--accent); flex:none; }
  .q-title{ flex:1; font-size:13.5px; font-weight:700; color:var(--ink); border:none; background:transparent;
    font-family:var(--sans); padding:2px 0; }
  .q-title:focus{ outline:none; border-bottom:1px solid var(--line-2); }
  .q-del{ flex:none; border:none; background:transparent; color:var(--faint); font-size:17px; cursor:pointer; }
  .q textarea{ width:100%; min-height:130px; resize:vertical; font-family:var(--sans); font-size:13.5px;
    line-height:1.6; color:var(--ink); background:#fcfbf9; border:1px solid var(--line-2); border-radius:8px; padding:11px 13px; }
  .q textarea:focus{ outline:2px solid var(--wash); border-color:var(--accent); }
  .counter{ display:flex; gap:14px; align-items:center; margin-top:7px; font-size:11.5px; color:var(--faint); }
  .counter .lim{ margin-left:auto; display:flex; align-items:center; gap:6px; }
  .counter .lim input{ width:64px; font-size:11.5px; border:1px solid var(--line-2); border-radius:6px; padding:2px 6px; text-align:right; }
  .counter b{ color:var(--muted); }
  .counter.over b, .counter.over .n{ color:var(--over); font-weight:700; }

  .add{ margin-top:14px; border:1px dashed var(--line-2); background:var(--wash); color:var(--accent);
    border-radius:8px; padding:10px 16px; font-size:13px; font-weight:700; cursor:pointer; font-family:var(--sans); }

  .actionbar{ position:fixed; left:0; right:0; bottom:0; z-index:30; display:flex; justify-content:center;
    gap:10px; padding:12px; background:rgba(27,26,23,.96); }
  .actionbar button{ border:none; border-radius:7px; padding:9px 16px; font-size:13px; font-weight:700;
    cursor:pointer; font-family:var(--sans); background:#efe9df; color:#1b1a17; }
  .actionbar .status{ color:#8a857c; font-size:12px; align-self:center; }
  #out{ display:none; white-space:pre-wrap; font-family:ui-monospace,Menlo,Consolas,monospace; font-size:12px;
    background:#1b1a17; color:#e9e4d8; border-radius:8px; padding:14px; margin-top:14px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="bar"></div>
  <h1>자기소개서</h1>
  <p class="lead">문항별로 답변을 작성/다듬습니다. 실시간 글자수와 권장 상한을 확인하고, 다 되면 <strong>[전체 복사]</strong>로 내보냅니다. (진지 문서 — 이모지·감탄 금지, 두괄식 권장)</p>
  <div class="head-row">
    <div class="field"><label>지원 회사</label><input id="co" placeholder="회사명"></div>
    <div class="field"><label>지원 직무</label><input id="role" placeholder="직무"></div>
  </div>

  <div id="qs"></div>
  <button class="add" onclick="addQ()">＋ 문항 추가</button>
  <pre id="out"></pre>
</div>

<div class="actionbar">
  <button onclick="copyAll()">📋 전체 복사</button>
  <span class="status" id="status">문항+답변을 복사 → 제출 폼에 붙여넣기</span>
</div>

<script>
  const SAMPLES = [
    { q:'지원 동기 및 입사 후 포부 (1,000자)', a:'', lim:1000 },
    { q:'성장 과정에서 가장 도전적이었던 경험과 배운 점 (800자)', a:'', lim:800 },
    { q:'본인의 강점과 그것이 직무에 기여할 방식 (600자)', a:'', lim:600 },
  ];
  function el(html){ const t=document.createElement('template'); t.innerHTML=html.trim(); return t.content.firstChild; }
  function countChars(s){ const withSpace=[...s].length; const noSpace=[...s.replace(/\s/g,'')].length; return {withSpace,noSpace}; }

  function addQ(data){
    data = data || { q:'문항을 입력하세요 (권장 글자수)', a:'', lim:1000 };
    const node = el(`
      <div class="q">
        <div class="q-top">
          <span class="q-no"></span>
          <input class="q-title" value="${(data.q||'').replace(/"/g,'&quot;')}">
          <button class="q-del" title="삭제" onclick="this.closest('.q').remove(); renumber();">×</button>
        </div>
        <textarea placeholder="답변 (두괄식: 주장 → 근거 → 맺음말)">${data.a||''}</textarea>
        <div class="counter">
          <span>공백 포함 <b class="n cw">0</b>자</span>
          <span>공백 제외 <b class="cn">0</b>자</span>
          <span class="lim">권장 상한 <input type="number" class="limv" value="${data.lim||1000}"> 자</span>
        </div>
      </div>`);
    const ta = node.querySelector('textarea');
    const cw = node.querySelector('.cw'), cn = node.querySelector('.cn'), limv = node.querySelector('.limv');
    const counter = node.querySelector('.counter');
    function upd(){ const c=countChars(ta.value); cw.textContent=c.withSpace; cn.textContent=c.noSpace;
      const lim=parseInt(limv.value)||0; counter.classList.toggle('over', lim>0 && c.withSpace>lim); }
    ta.addEventListener('input', upd); limv.addEventListener('input', upd);
    document.getElementById('qs').appendChild(node); renumber(); upd();
  }
  function renumber(){ document.querySelectorAll('#qs .q .q-no').forEach((e,i)=> e.textContent=String(i+1).padStart(2,'0')); }

  SAMPLES.forEach(addQ);

  function copyAll(){
    const co=(document.getElementById('co').value||'').trim(), role=(document.getElementById('role').value||'').trim();
    let L=[`=== 자기소개서 · ${co||'(회사)'} / ${role||'(직무)'} ===`];
    document.querySelectorAll('#qs .q').forEach((q,i)=>{
      const title=q.querySelector('.q-title').value.trim();
      const a=q.querySelector('textarea').value.trim();
      const c=countChars(a);
      L.push(`\n[문항 ${i+1}] ${title}  (${c.withSpace}자/공백포함)`);
      L.push(a||'(미작성)');
    });
    L.push('\n=== END ===');
    const txt=L.join('\n');
    navigator.clipboard.writeText(txt).then(
      ()=>setStatus('복사됨 — 제출 폼에 붙여넣으세요'),
      ()=>{ const o=document.getElementById('out'); o.textContent=txt; o.style.display='block'; setStatus('클립보드 차단 — 아래 직접 복사'); });
  }
  function setStatus(s){ const e=document.getElementById('status'); const o=e.textContent; e.textContent=s; setTimeout(()=>e.textContent=o,4000); }
</script>
</body>
</html>
